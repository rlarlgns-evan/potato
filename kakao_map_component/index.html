<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="referrer" content="origin"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; font-family: 'Plus Jakarta Sans', sans-serif; }
    .map-shell {
      background: #fff; border-radius: 22px; padding: 0.75rem;
      border: 1px solid #E2E8F0; box-shadow: 0 12px 36px rgba(13, 148, 136, 0.12);
    }
    .map-head {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.25rem 0.35rem 0.55rem; gap: 10px; flex-wrap: wrap;
    }
    .map-label { font-weight: 800; color: #134E4A; font-size: 0.88rem; letter-spacing: 0.04em; text-transform: uppercase; }
    .map-focus {
      font-size: 0.7rem; font-weight: 700; color: #fff;
      background: linear-gradient(135deg, #0D9488, #14B8A6);
      padding: 0.35rem 0.7rem; border-radius: 999px; max-width: 72%;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #map-wrap {
      width: 100%; position: relative; overflow: hidden;
      border-radius: 16px; background: #F1F5F9; border: 1px solid #E2E8F0;
    }
    #map-loading {
      position: absolute; inset: 0; z-index: 5; display: flex; align-items: center;
      justify-content: center; color: #64748B; font-size: 0.85rem; background: #F1F5F9;
    }
    #map-error {
      display: none; padding: 8px 10px; color: #92400E; font-size: 11px;
      background: #FFFBEB; border-radius: 10px; margin-bottom: 6px; line-height: 1.45;
    }
    #map { width: 100%; }
    .order-pin {
      background: #14B8A6; color: #fff; font-weight: 700; font-size: 12px;
      width: 26px; height: 26px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center;
      border: 2px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    }
    .order-pin.focus {
      background: #E85D04; width: 32px; height: 32px; font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="map-shell">
    <div class="map-head">
      <span class="map-label" id="map-label">Live Kakao Map</span>
      <span class="map-focus" id="map-focus-badge">일정 카드를 클릭하세요</span>
    </div>
    <div id="map-error"></div>
    <div id="map-wrap">
      <div id="map-loading">카카오 지도 불러오는 중…</div>
      <div id="map"></div>
    </div>
  </div>

  <script>
    let mapEngine = '';
    let mapReady = false;
    let lastArgsKey = '';

    function setFrameH(h) {
      if (window.Streamlit) Streamlit.setFrameHeight(h + 88);
    }

    function showWarn(msg) {
      const el = document.getElementById('map-error');
      el.style.display = 'block';
      el.innerHTML = msg;
    }

    function hideLoading() {
      const el = document.getElementById('map-loading');
      if (el) el.style.display = 'none';
    }

    function setLabel(title, focus) {
      document.getElementById('map-label').textContent = title || 'Live Kakao Map';
      document.getElementById('map-focus-badge').textContent =
        focus ? ('📍 ' + focus) : '일정 카드를 클릭하세요';
    }

    function popupHtml(spot, showNumbers, focused) {
      const stay = spot.stay_minutes ? ('약 ' + spot.stay_minutes + '분') : '';
      return '<div style="min-width:200px;line-height:1.5;font-size:13px;">'
        + '<strong>' + (showNumbers && spot.order ? spot.order + '. ' : '') + spot.name + '</strong><br/>'
        + (spot.region || '') + (spot.theme ? ' · ' + spot.theme : '') + (stay ? ' · ' + stay : '') + '<br/>'
        + (spot.why || '') + '<br/><span style="color:#94A3B8;font-size:11px;">'
        + spot.lat.toFixed(5) + ', ' + spot.lng.toFixed(5) + '</span></div>';
    }

    function isFocused(spot, focusOrder) {
      return focusOrder > 0 && spot.order === focusOrder;
    }

    function initLeaflet(args) {
      if (mapEngine === 'kakao') return;
      mapEngine = 'leaflet';
      const container = document.getElementById('map');
      container.innerHTML = '';
      container.style.height = args.height + 'px';

      const map = L.map(container).setView([args.center_lat, args.center_lng], 9);
      L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 18, attribution: '© OpenStreetMap'
      }).addTo(map);

      const latlngs = [];
      let focusSpot = null;
      args.markers.forEach(function(spot) {
        const ll = [spot.lat, spot.lng];
        latlngs.push(ll);
        const focused = isFocused(spot, args.focus_order);
        if (focused) focusSpot = spot;
        const icon = L.divIcon({
          html: '<div class="order-pin' + (focused ? ' focus' : '') + '">' + (args.show_numbers ? spot.order : '') + '</div>',
          className: '', iconSize: focused ? [32, 32] : [26, 26], iconAnchor: focused ? [16, 16] : [13, 13]
        });
        const m = L.marker(ll, { icon: icon }).addTo(map);
        m.bindPopup(popupHtml(spot, args.show_numbers, focused));
        if (focused) { map.setView(ll, 12); m.openPopup(); }
      });

      if (args.show_route && latlngs.length > 1) {
        L.polyline(latlngs, { color: '#14B8A6', weight: 4, opacity: 0.85 }).addTo(map);
      }
      if (!focusSpot && latlngs.length > 1) map.fitBounds(latlngs, { padding: [40, 40] });

      mapReady = true;
      hideLoading();
      setTimeout(function() { map.invalidateSize(); }, 200);
    }

    function initKakao(args) {
      mapEngine = 'kakao';
      const container = document.getElementById('map');
      container.innerHTML = '';
      container.style.height = args.height + 'px';

      const map = new kakao.maps.Map(container, {
        center: new kakao.maps.LatLng(args.center_lat, args.center_lng),
        level: 8
      });

      const bounds = new kakao.maps.LatLngBounds();
      const path = [];
      let focusSpot = null;

      args.markers.forEach(function(spot) {
        const pos = new kakao.maps.LatLng(spot.lat, spot.lng);
        bounds.extend(pos);
        path.push(pos);
        const focused = isFocused(spot, args.focus_order);
        if (focused) focusSpot = spot;

        const marker = new kakao.maps.Marker({ position: pos });
        marker.setMap(map);

        if (args.show_numbers && spot.order > 0) {
          const bg = focused ? '#E85D04' : '#14B8A6';
          const label = '<div style="padding:4px 9px;background:' + bg + ';color:#fff;border-radius:6px;font-size:12px;font-weight:700;">' + spot.order + '</div>';
          new kakao.maps.CustomOverlay({ position: pos, content: label, yAnchor: 1.45 }).setMap(map);
        }

        const iw = new kakao.maps.InfoWindow({ content: popupHtml(spot, args.show_numbers, focused) });
        kakao.maps.event.addListener(marker, 'click', function() { iw.open(map, marker); });
        if (focused) { iw.open(map, marker); map.setCenter(pos); map.setLevel(5); }
      });

      if (args.show_route && path.length > 1) {
        new kakao.maps.Polyline({
          path: path, strokeWeight: 4, strokeColor: '#14B8A6', strokeOpacity: 0.85, strokeStyle: 'solid'
        }).setMap(map);
      }
      if (!focusSpot && args.markers.length > 1) map.setBounds(bounds);
      else if (!focusSpot && args.markers.length === 1) {
        map.setCenter(new kakao.maps.LatLng(args.markers[0].lat, args.markers[0].lng));
        map.setLevel(7);
      }

      mapReady = true;
      hideLoading();
      function relayout() { map.relayout(); }
      setTimeout(relayout, 100);
      setTimeout(relayout, 500);
    }

    function useOsm(args, msg) {
      showWarn(msg + '<br/><small>도메인: https://kangwon-potato.streamlit.app · http://localhost:8501</small>');
      setLabel('OpenStreetMap (대체)', args.focus_label);
      if (typeof L === 'undefined') {
        const s = document.createElement('script');
        s.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
        s.onload = function() { initLeaflet(args); };
        document.head.appendChild(s);
      } else {
        initLeaflet(args);
      }
    }

    function boot(args) {
      mapReady = false;
      mapEngine = '';
      document.getElementById('map-error').style.display = 'none';
      document.getElementById('map-loading').style.display = 'flex';
      setLabel(args.title, args.focus_label);
      setFrameH(args.height);

      if (!args.appkey) {
        useOsm(args, 'KAKAO_MAP_APP_KEY가 없습니다.');
        return;
      }

      let settled = false;
      const timer = setTimeout(function() {
        if (!settled) {
          settled = true;
          useOsm(args, '카카오 지도 연결 실패 (6초). JavaScript SDK 도메인·키를 확인하세요.');
        }
      }, 6000);

      function ok() {
        settled = true;
        clearTimeout(timer);
        setLabel('Kakao Map', args.focus_label);
      }

      function fail(msg) {
        if (settled) return;
        settled = true;
        clearTimeout(timer);
        useOsm(args, msg);
      }

      function run() {
        kakao.maps.load(function() {
          try {
            initKakao(args);
            ok();
          } catch (e) {
            fail('카카오 오류: ' + e.message);
          }
        });
      }

      if (typeof kakao !== 'undefined' && kakao.maps && kakao.maps.load) {
        run();
        return;
      }

      const sdk = document.createElement('script');
      sdk.src = 'https://dapi.kakao.com/v2/maps/sdk.js?appkey=' + encodeURIComponent(args.appkey) + '&autoload=false';
      sdk.onload = function() { run(); };
      sdk.onerror = function() { fail('카카오 SDK 로드 실패'); };
      document.head.appendChild(sdk);
    }

    function onRender(event) {
      const args = event.detail.args;
      args.markers = JSON.parse(args.markers_json || '[]');
      const key = JSON.stringify({
        m: args.markers_json,
        f: args.focus_order,
        h: args.height
      });
      if (key === lastArgsKey && mapReady) {
        setFrameH(args.height);
        setLabel(args.title, args.focus_label);
        return;
      }
      lastArgsKey = key;
      boot(args);
    }

    if (window.Streamlit) {
      Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onRender);
      Streamlit.setComponentReady();
    } else {
      document.getElementById('map-error').style.display = 'block';
      document.getElementById('map-error').textContent = 'Streamlit 컴포넌트 로드 실패';
    }
  </script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
