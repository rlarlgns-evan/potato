<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="ﾐｹﾄ森ﾄ">
  <defs>
    <linearGradient id="ocean" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a8dce8"/>
      <stop offset="45%" stop-color="#7ec8db"/>
      <stop offset="100%" stop-color="#5ab4cc"/>
    </linearGradient>
    <linearGradient id="land" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d8efe8"/>
      <stop offset="55%" stop-color="#b8ddd2"/>
      <stop offset="100%" stop-color="#98cbb8"/>
    </linearGradient>
    <linearGradient id="peak" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7aab9a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#4d8f7c" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="coastGlow" x1="100%" y1="50%" x2="0%" y2="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- sky -->
  <rect width="1200" height="800" fill="url(#ocean)"/>

  <!-- distant land haze west -->
  <ellipse cx="180" cy="420" rx="220" ry="280" fill="#c5e8df" opacity="0.55"/>

  <!-- Gangwon province silhouette (stylized) -->
  <path fill="url(#land)" stroke="#5a9a88" stroke-width="2.5" stroke-linejoin="round"
    d="M 248 148
       C 310 92, 420 72, 540 68
       C 680 64, 820 88, 930 132
       C 1010 168, 1068 228, 1092 310
       C 1110 378, 1102 468, 1068 548
       C 1030 628, 960 688, 868 724
       C 780 756, 670 768, 560 758
       C 440 746, 340 708, 268 648
       C 210 598, 178 528, 168 452
       C 158 372, 182 292, 228 218
       C 238 198, 242 172, 248 148 Z"/>

  <!-- Taebaek ridge hint -->
  <path fill="none" stroke="url(#peak)" stroke-width="28" stroke-linecap="round"
    d="M 320 520 C 480 380, 620 340, 820 300"/>
  <path fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.35"
    d="M 320 520 C 480 380, 620 340, 820 300"/>

  <!-- east coast highlight -->
  <path fill="url(#coastGlow)" opacity="0.7"
    d="M 930 132
       C 1010 168, 1068 228, 1092 310
       C 1110 378, 1102 468, 1068 548
       C 1030 628, 960 688, 868 724
       L 900 720
       C 990 660, 1050 560, 1068 460
       C 1084 368, 1048 248, 960 168
       C 920 140, 930 132, 930 132 Z"/>

  <!-- major cities (decorative) -->
  <g fill="#006a61" opacity="0.55">
    <circle cx="318" cy="248" r="5"/><circle cx="398" cy="312" r="4.5"/>
    <circle cx="498" cy="358" r="4.5"/><circle cx="612" cy="392" r="5"/>
    <circle cx="738" cy="418" r="4.5"/><circle cx="852" cy="468" r="4"/>
    <circle cx="928" cy="548" r="4"/><circle cx="768" cy="588" r="4"/>
  </g>

  <!-- label -->
  <text x="600" y="680" text-anchor="middle" font-family="Pretendard, Inter, sans-serif"
    font-size="28" font-weight="700" fill="#00564f" opacity="0.42" letter-spacing="0.28em">ﾐｹﾄ森ﾄ</text>
  <text x="600" y="712" text-anchor="middle" font-family="Inter, sans-serif"
    font-size="14" font-weight="600" fill="#006a61" opacity="0.28" letter-spacing="0.35em">GANGWON ｷ KOREA</text>
</svg>
