<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <script>
    (function () {
      var path = location.pathname;
      if (!path.endsWith("/")) {
        path = path.lastIndexOf(".") > path.lastIndexOf("/")
          ? path.slice(0, path.lastIndexOf("/") + 1)
          : path + "/";
      }
      var base = document.createElement("base");
      base.href = path;
      document.head.appendChild(base);
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="referrer" content="origin" />
  <title>VoyageAI · 강원 — AI Journey Curator</title>
  <meta name="description" content="강원도 당일·반나절 여행 코스를 AI가 큐레이션합니다." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css?v=13" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>" />
</head>
<body class="mode-landing">
  <div class="wrap">
    <!-- ============ Landing: AI chat + Gangwon map ============ -->
    <main id="view-explore" class="landing-view">
      <div id="landing-map" aria-hidden="true"></div>
      <div class="landing-scrim" aria-hidden="true"></div>

      <div class="landing-content">
        <div class="chat-shell chat-landing" id="chat-shell">
          <div class="chat-shell-header">
            <span class="chat-dot"></span>
            <div class="chat-shell-title">
              <strong>AI Concierge</strong>
              <span>실시간 여행 추천 · 강원 <span id="spot-count">24</span>곳</span>
            </div>
          </div>
          <div class="chat-body" id="agent-messages" role="log" aria-live="polite"></div>
          <div class="chat-footer">
            <div class="chat-starters" id="agent-starters">
              <p class="suggest-label">이렇게 물어보세요</p>
              <div class="pills" id="suggest-pills"></div>
            </div>
            <form class="chat-input-bar" id="agent-form">
              <div class="chat-input-inner">
                <textarea id="agent-input" rows="1" placeholder="메시지를 입력하세요…" autocomplete="off"></textarea>
                <button class="chat-send-btn" id="agent-send" type="submit" aria-label="전송">
                  <span id="agent-send-label">↑</span>
                  <span class="spinner" id="agent-spin"></span>
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>

    <!-- ============ Planner (after chat) ============ -->
    <main id="view-planner" class="hidden">
      <div class="planner-grid">
        <aside class="side">
          <div class="sb-logo">VoyageAI</div>
          <a class="sb-item" data-nav="explore">✦ 새 여행</a>
          <a class="sb-item on">▤ 일정</a>
          <a class="sb-item" data-nav="trips">♡ 저장</a>
          <a class="sb-foot" id="btn-logout">↪ 처음으로</a>
        </aside>
        <section class="planner-main">
          <div class="tailored-head">
            <div>
              <h1 id="plan-title">맞춤 여행 코스</h1>
              <p id="plan-summary"></p>
              <p class="q-line" id="plan-query"></p>
            </div>
            <div class="head-chips">
              <span class="chip" id="chip-source">◆ 로컬 AI</span>
              <span class="chip" id="chip-duration">⏱ 당일 코스</span>
              <span class="chip" id="chip-stops"></span>
              <span class="chip chip-route" id="chip-route"></span>
            </div>
          </div>
          <div class="route-summary" id="route-summary"></div>
          <div class="trip-plan hidden" id="trip-plan"></div>
          <div class="split">
            <div>
              <p class="panel-lbl">일정 타임라인</p>
              <p class="panel-hint">카드를 탭하면 지도·상세 정보가 갱신됩니다</p>
              <div class="courses" id="courses"></div>
              <button class="btn-secondary" data-nav="explore">✦ 새 여행 설계하기</button>
            </div>
            <div class="map-stick">
              <div class="map-float">
                <span class="map-q" id="map-q"></span>
                <span class="map-f" id="map-f"></span>
              </div>
              <a class="kakao-link" id="kakao-link" target="_blank" rel="noopener">🧭 카카오맵에서 길찾기</a>
              <div id="map-wrap"><div id="map"></div></div>
              <p class="map-note hidden" id="map-note"></p>
              <div class="spot-detail" id="spot-detail"></div>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="config.js"></script>
  <script src="data.js?v=13"></script>
  <script src="app.js?v=13"></script>
</body>
</html>
