name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/supabase-functions.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy kakao-directions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          KAKAO_REST_KEY: ${{ secrets.KAKAO_REST_KEY }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "SUPABASE_ACCESS_TOKEN secret missing — skip Edge Function deploy"
            exit 0
          fi
          strip_val() { printf '%s' "$1" | sed 's/^[Vv][Aa][Ll][Uu][Ee]:[[:space:]]*//'; }
          KEY="$(strip_val "$KAKAO_REST_KEY")"
          if [ -n "$KEY" ]; then
            supabase secrets set "KAKAO_REST_KEY=$KEY" --project-ref ocmykswlbeaaicyrmskl
          fi
          supabase functions deploy kakao-directions --project-ref ocmykswlbeaaicyrmskl --no-verify-jwt
