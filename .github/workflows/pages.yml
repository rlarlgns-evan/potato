name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths: ["docs/**", "data/**", "scripts/sync_content.py", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate docs/data.js from canonical JSON
        run: python scripts/sync_content.py generate

      - name: Verify docs/data.js matches canonical JSON
        run: python scripts/sync_content.py --check

      - name: Inject API keys from secrets
        run: |
          KAKAO="${KAKAO_JS_KEY#Value: }"
          KAKAO="${KAKAO#value: }"
          KAKAO="$(printf '%s' "$KAKAO" | sed 's/^[Vv][Aa][Ll][Uu][Ee]:[[:space:]]*//')"
          GEMINI="${GOOGLE_API_KEY#Value: }"
          GEMINI="${GEMINI#value: }"
          GEMINI="$(printf '%s' "$GEMINI" | sed 's/^[Vv][Aa][Ll][Uu][Ee]:[[:space:]]*//')"
          {
            printf 'window.KAKAO_JS_KEY = "%s";\n' "$KAKAO"
            printf 'window.GEMINI_API_KEY = "%s";\n' "$GEMINI"
          } > docs/config.js
        env:
          KAKAO_JS_KEY: ${{ secrets.KAKAO_JS_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
