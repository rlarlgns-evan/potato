name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths: ["docs/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject Kakao JS key from secret
        run: |
          KEY="${KAKAO_JS_KEY#Value: }"
          KEY="${KEY#value: }"
          KEY="$(printf '%s' "$KEY" | sed 's/^[Vv][Aa][Ll][Uu][Ee]:[[:space:]]*//')"
          printf 'window.KAKAO_JS_KEY = "%s";\n' "$KEY" > docs/config.js
        env:
          KAKAO_JS_KEY: ${{ secrets.KAKAO_JS_KEY }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
