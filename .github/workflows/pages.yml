name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths: ["docs/**", "data/**", "scripts/sync_*.py", "scripts/import_sigungu_codes.py", "tour_api.py", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync TourAPI + generate data.js
        run: |
          if [ -n "$TOUR_API_SERVICE_KEY" ]; then
            python scripts/sync_tour_all.py
          else
            echo "TOUR_API_SERVICE_KEY not set — using committed JSON only"
            python scripts/sync_content.py generate
          fi
        env:
          TOUR_API_SERVICE_KEY: ${{ secrets.TOUR_API_SERVICE_KEY }}

      - name: Verify docs/data.js matches canonical JSON
        run: python scripts/sync_content.py --check

      - name: Inject API keys from secrets
        run: |
          KAKAO="${KAKAO_JS_KEY#Value: }"
          KAKAO="${KAKAO#value: }"
          KAKAO="$(printf '%s' "$KAKAO" | sed 's/^[Vv][Aa][Ll][Uu][Ee]:[[:space:]]*//')"
          GEMINI="${GOOGLE_API_KEY#Value: }"
          GEMINI="${GEMINI#value: }"
          GEMINI="$(printf '%s' "$GEMINI" | sed 's/^[Vv][Aa][Ll][Uu][Ee]:[[:space:]]*//')"
          SB_URL="${SUPABASE_URL#Value: }"
          SB_URL="${SB_URL#value: }"
          SB_URL="$(printf '%s' "$SB_URL" | sed 's/^[Vv][Aa][Ll][Uu][Ee]:[[:space:]]*//')"
          SB_KEY="${SUPABASE_ANON_KEY#Value: }"
          SB_KEY="${SB_KEY#value: }"
          SB_KEY="$(printf '%s' "$SB_KEY" | sed 's/^[Vv][Aa][Ll][Uu][Ee]:[[:space:]]*//')"
          {
            printf 'window.KAKAO_JS_KEY = "%s";\n' "$KAKAO"
            printf 'window.GEMINI_API_KEY = "%s";\n' "$GEMINI"
            printf 'window.SUPABASE_URL = "%s";\n' "$SB_URL"
            printf 'window.SUPABASE_ANON_KEY = "%s";\n' "$SB_KEY"
          } > docs/config.js
        env:
          KAKAO_JS_KEY: ${{ secrets.KAKAO_JS_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
